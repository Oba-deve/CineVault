<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVault | Your Personal Movie Sanctuary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        netflixRed: '#E50914',
                        darkBg: '#141414',
                        darkCard: '#1f1f1f',
                        lightGray: '#b3b3b3'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-darkBg text-white font-sans min-h-screen overflow-x-hidden">

    <!-- Header -->
    <header
        class="sticky top-0 z-50 bg-darkBg/95 backdrop-blur-md border-b border-white/10 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-2 cursor-pointer" id="logo-btn">
            <div class="w-10 h-10 flex items-center justify-center bg-netflixRed rounded-lg shadow-lg">
                <svg viewBox="0 0 24 24" class="w-7 h-7 fill-white" xmlns="http://www.w3.org/2000/svg">
                    <!-- Vault base -->
                    <rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor"
                        stroke-width="2" />
                    <!-- Vault door circle -->
                    <circle cx="12" cy="12" r="6" stroke="currentColor" stroke-width="1.5" fill="none" />
                    <!-- Play button inside -->
                    <path d="M10.5 9.5l5 2.5-5 2.5v-5z" fill="currentColor" />
                    <!-- Vault details -->
                    <circle cx="6" cy="6" r="1" fill="currentColor" />
                    <circle cx="18" cy="6" r="1" fill="currentColor" />
                    <circle cx="6" cy="18" r="1" fill="currentColor" />
                    <circle cx="18" cy="18" r="1" fill="currentColor" />
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tighter text-white">CINE<span
                    class="text-netflixRed text-3xl">VAULT</span></h1>
        </div>

        <nav class="flex items-center gap-6">
            <button id="nav-home" class="text-white hover:text-netflixRed transition font-semibold">Home</button>
            <button id="nav-watchlist" class="text-lightGray hover:text-white transition font-semibold">My
                Watchlist</button>
        </nav>

        <div class="relative w-full md:w-96 group">
            <input type="text" id="movie-search" placeholder="Search movies..."
                class="w-full bg-darkCard border border-white/20 rounded-full px-6 py-2.5 outline-none focus:border-netflixRed focus:ring-1 focus:ring-netflixRed transition-all">
            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-lightGray group-focus-within:text-netflixRed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8">
        <!-- Hero Section (Visible only on Home) -->
        <div id="hero-section" class="mb-12 relative h-[400px] rounded-3xl overflow-hidden hidden group">
            <img id="hero-img" src="" alt="Featured Movie" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-darkBg via-darkBg/50 to-transparent"></div>
            <div class="absolute bottom-10 left-10 max-w-2xl">
                <h2 id="hero-title" class="text-5xl font-bold mb-4"></h2>
                <p id="hero-desc" class="text-lightGray line-clamp-3 mb-6"></p>
                <button id="hero-details-btn"
                    class="bg-white text-black px-8 py-3 rounded-md font-bold hover:bg-white/80 transition flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    More Info
                </button>
            </div>
        </div>

        <!-- Section Title -->
        <h2 id="section-title" class="text-3xl font-bold mb-8 flex items-center gap-3">
            <span class="w-1.5 h-8 bg-netflixRed rounded-full"></span>
            Popular Movies
        </h2>

        <!-- Movie Grid -->
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">
            <!-- Movie cards injected here -->
        </div>

        <!-- Watchlist Empty State -->
        <div id="watchlist-empty" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 text-white/10 mb-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
            </svg>
            <h3 class="text-2xl font-semibold mb-2">Your watchlist is empty</h3>
            <p class="text-lightGray mb-8">Start adding movies to your vault to keep track of them.</p>
            <button id="back-home-btn"
                class="bg-netflixRed hover:bg-netflixRed/80 px-8 py-3 rounded-md font-bold transition">Explore
                Movies</button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/10 py-10 text-center text-lightGray">
        <p>&copy; 2024 CineVault. Made by Oba.Dev . All rights reserved.</p>
        <p class="text-sm mt-2">Powered by TMDB API</p>
    </footer>

    <!-- Movie Modal -->
    <div id="movie-modal"
        class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-all">
        <div
            class="bg-darkCard w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl relative shadow-2xl animate-in fade-in zoom-in duration-300">
            <button id="close-modal"
                class="absolute top-6 right-6 z-10 bg-black/50 hover:bg-black w-10 h-10 rounded-full flex items-center justify-center transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <div id="modal-content" class="flex flex-col md:flex-row">
                <!-- Data will be injected here -->
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
